<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Top Card Gradient: Indigo to Fuchsia (Modern Tech) -->
    <linearGradient id="front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#c026d3" />
    </linearGradient>
    
    <!-- Middle Card Gradient: Sky to Blue (Clarity & Focus) -->
    <linearGradient id="middle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Bottom Card Gradient: Rose to Orange (Energy & Warmth) -->
    <linearGradient id="back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
    
    <!-- Soft 3D Shadow for layers -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Bottom card -->
  <path d="M22 75 L60 98 L98 75 L60 52 Z" fill="url(#back)" stroke="url(#back)" stroke-width="6" stroke-linejoin="round" filter="url(#shadow)" />
  
  <!-- Middle card -->
  <path d="M22 60 L60 83 L98 60 L60 37 Z" fill="url(#middle)" stroke="url(#middle)" stroke-width="6" stroke-linejoin="round" filter="url(#shadow)" />
  
  <!-- Top card -->
  <path d="M22 45 L60 68 L98 45 L60 22 Z" fill="url(#front)" stroke="url(#front)" stroke-width="6" stroke-linejoin="round" filter="url(#shadow)" />

</svg>